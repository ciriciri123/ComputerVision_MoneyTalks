<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks - Deteksi Uang Kertas</title>
    <style>
        /* WCAG 2.1 AA High Contrast Theme */
        :root {
            --bg-color: #121212;
            --text-color: #FFFFFF;
            --accent-color: #FFEB3B; /* High contrast yellow */
            --error-color: #FF5252;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Large text for partial vision users (min 3rem) */
        #result-display {
            font-size: 3.5rem; 
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: var(--accent-color);
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border: 4px solid var(--text-color);
            border-radius: 12px;
            overflow: hidden;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Hidden canvas for frame extraction */
        #capture-canvas {
            display: none; 
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-size: 1.5rem;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:focus {
            outline: 4px solid var(--accent-color);
            outline-offset: 4px;
        }
    </style>
</head>
<body>

    <main>
        <div id="result-display" aria-live="assertive" aria-atomic="true">
            Menunggu kamera...
        </div>

        <div class="camera-container">
            <video id="camera-feed" autoplay playsinline muted aria-label="Live camera feed for banknote detection"></video>
        </div>
        <canvas id="capture-canvas"></canvas>

        <button id="mute-toggle" aria-label="Mute audio">Bungkam Suara</button>
    </main>

    <script src="../static/app.js"></script>
</body>
</html>
