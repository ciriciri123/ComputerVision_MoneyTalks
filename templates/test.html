<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks - Test Upload</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 30px; 
            max-width: 600px; 
            margin: auto; 
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #10B981; }
        .upload-area {
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            text-align: center;
        }
        input[type="file"] { margin-bottom: 15px; }
        button {
            background-color: #10B981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }
        button:hover { background-color: #059669; }
        
        /* Wadah untuk menahan gambar dan kotak merah */
        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            margin-top: 20px;
        }
        .preview { 
            max-width: 100%; 
            border-radius: 8px; 
            display: none; 
            border: 1px solid #e5e7eb;
        }
        
        /* GAYA KOTAK MERAH */
        .cv-box {
            position: absolute;
            border: 3px solid #EF4444; 
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            pointer-events: none;
            z-index: 10;
            display: none;
            border-radius: 4px;
        }

        .result { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 8px; 
            background: #ecfdf5; 
            border: 1px solid #10B981;
            display: none; 
        }
        .result p { margin: 8px 0; }
        .loader { display: none; color: #6b7280; font-style: italic; text-align: center; margin-top: 15px;}
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Test Upload Gambar</h2>
        <p>Halaman khusus untuk mengetes akurasi model SVM dengan gambar statis.</p>

        <div class="upload-area">
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/jpg">
            <button onclick="uploadImage()">Analisis Uang</button>
            <p id="loading" class="loader">Memproses gambar dengan AI...</p>
        </div>

        <div class="image-container">
            <img id="previewImage" class="preview" alt="Preview" />
            <div id="cv-box" class="cv-box"></div>
        </div>

        <div id="resultBox" class="result">
            <h3 style="margin-top: 0; color: #047857;">Hasil Prediksi</h3>
            <p><strong>Raw Label (SVM):</strong> <span id="resLabel">-</span></p>
            <p><strong>Confidence:</strong> <span id="resConf">-</span></p>
            <p><strong>Pesan ke User:</strong> <strong style="color: #10B981;"><span id="resMsg">-</span></strong></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const resultBox = document.getElementById('resultBox');
        const loading = document.getElementById('loading');
        const cvBox = document.getElementById('cv-box');

        // Memunculkan preview gambar sebelum dikirim
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                    resultBox.style.display = 'none'; 
                    cvBox.style.display = 'none'; // Sembunyikan kotak merah lama
                }
                reader.readAsDataURL(file);
            }
        });

        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) {
                alert("Silakan pilih gambar uang terlebih dahulu!");
                return;
            }

            const formData = new FormData();
            formData.append('frame', file);

            loading.style.display = 'block';
            resultBox.style.display = 'none';
            cvBox.style.display = 'none';

            try {
                const response = await fetch('/api/detect', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (response.ok) {
                    resultBox.style.display = 'block';
                    document.getElementById('resLabel').innerText = data.raw_label || 'Tidak Terdeteksi';
                    
                    const confPercent = (data.confidence * 100).toFixed(2);
                    document.getElementById('resConf').innerText = confPercent + '%';
                    document.getElementById('resMsg').innerText = data.message || '-';
                    
                    // LOKASI MENGGAMBAR KOTAK MERAH!
                    if (data.box && data.box.length === 4 && data.box[2] > 0) {
                        cvBox.style.display = 'block';
                        cvBox.style.left = (data.box[0] * 100) + '%';
                        cvBox.style.top = (data.box[1] * 100) + '%';
                        cvBox.style.width = (data.box[2] * 100) + '%';
                        cvBox.style.height = (data.box[3] * 100) + '%';
                    }

                    if(data.valid) {
                        resultBox.style.background = '#ecfdf5';
                        resultBox.style.borderColor = '#10B981';
                    } else {
                        resultBox.style.background = '#fef2f2';
                        resultBox.style.borderColor = '#ef4444';
                    }
                } else {
                    alert("Error dari Server: " + data.error);
                }
            } catch (e) {
                loading.style.display = 'none';
                alert("Gagal menghubungi server. Error: " + e.message);
            }
        }
    </script>
</body>
</html>
