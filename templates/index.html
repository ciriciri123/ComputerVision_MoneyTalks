<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks - Pendeteksi Uang Rupiah</title>
    <!-- Google Fonts for aesthetic UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- WCAG 2.1 AA Compliance with 48pt font equivalent for visual output -->
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #111827;
        }
        .app-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px 20px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.25rem;
            margin-top: 0;
            margin-bottom: 8px;
            color: #111827;
            font-weight: 800;
        }
        p.subtitle {
            font-size: 1.15rem;
            color: #6B7280;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 16px 32px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #10B981;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-secondary {
            background-color: #EF4444;
            color: white;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #DC2626;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(239, 68, 68, 0.2);
        }
        .btn:disabled {
            background-color: #E5E7EB;
            color: #9CA3AF;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #video-container {
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #1F2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #F3F4F6;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cv-box {
            position: absolute;
            border: 3px solid #EF4444; /* computer vision red */
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            pointer-events: none;
            z-index: 10;
            display: none;
            transition: all 0.1s ease-out; /* smooth box movement */
        }
        #result-text {
            /* PRD requirement: Text must be large for visual impairment (approx. 48pt or large EM) */
            font-size: 48pt;
            font-weight: 800;
            color: #065F46;
            margin-top: 25px;
            line-height: 1.2;
            padding: 20px;
            background: #D1FAE5;
            border-radius: 16px;
            border: 2px solid #10B981;
            word-wrap: break-word;
        }
        #status {
            font-size: 1.15rem;
            color: #4B5563;
            margin-top: 15px;
            font-weight: 600;
            padding: 10px;
            background: #F9FAFB;
            border-radius: 8px;
            display: inline-block;
        }

        /* Screen reader focused area */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 tabindex="0">MoneyTalks</h1>
    <p class="subtitle">Arahkan uang kertas Rupiah ke kamera Anda.</p>

    <!-- Controls -->
    <div class="btn-group">
        <button id="start-btn" class="btn btn-primary" aria-label="Mulai Deteksi Kamera">Mulai</button>
        <button id="stop-btn" class="btn btn-secondary" aria-label="Hentikan Deteksi" disabled>Berhenti</button>
    </div>

    <!-- Live Preview -->
    <div id="video-container">
        <!-- aria-live updates screen readers as detection changes -->
        <video id="camera-stream" autoplay playsinline aria-hidden="true"></video>
        <div id="cv-box" class="cv-box"></div>
    </div>
    
    <!-- ARIA Live region for Screen Reader to read outputs automatically -->
    <div id="status" aria-live="polite">Kamera siap digunakan.</div>
    <div id="result-text" aria-live="assertive">Belum Dideteksi</div>
</div>

    <script>
        const video = document.getElementById("camera-stream");
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const resultText = document.getElementById("result-text");
        const statusText = document.getElementById("status");

        let stream = null;
        let detectionInterval = null;
        let isSpeaking = false;
        let lastDetectedLabel = "";
        let audioCooldown = null;

        startBtn.addEventListener("click", async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusText.innerText = "Kamera aktif. Sedang memproses gambar...";
                
                // PRD Requirement: Capture frame every 1 second (1000ms)
                detectionInterval = setInterval(captureAndSendFrame, 1000);
                speakOut("Kamera aktif. Mengambil gambar.");
                lastDetectedLabel = "";
            } catch (err) {
                console.error("Camera access error:", err);
                statusText.innerText = "Gagal mengakses kamera. " + err.message;
                speakOut("Gagal mengakses kamera.");
            }
        });

        stopBtn.addEventListener("click", () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            clearInterval(detectionInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "Kamera dinonaktifkan.";
            resultText.innerText = "Belum Dideteksi";
            document.getElementById('cv-box').style.display = 'none';
            speakOut("Kamera dimatikan.");
        });

        function speakOut(text) {
            // Web Speech API for zero-latency client-side audio
            if (!window.speechSynthesis) return;
            
            // Only speak if we aren't already speaking it to prevent overlapping spam
            if (window.speechSynthesis.speaking) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "id-ID";
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        async function captureAndSendFrame() {
            if (!video.videoWidth) return;

            // Draw to canvas
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas to Blob via fetch wrapper or native method -> form boundary
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("frame", blob, "frame.jpg");

                try {
                    const response = await fetch("/api/detect", {
                        method: "POST",
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // Draw CV box
                        const cvBox = document.getElementById('cv-box');
                        if (data.box && data.box.length === 4 && data.box[2] > 0) {
                            cvBox.style.display = 'block';
                            cvBox.style.left = (data.box[0] * 100) + '%';
                            cvBox.style.top = (data.box[1] * 100) + '%';
                            cvBox.style.width = (data.box[2] * 100) + '%';
                            cvBox.style.height = (data.box[3] * 100) + '%';
                        } else {
                            cvBox.style.display = 'none';
                        }
                        
                        if (data.valid) {
                            // High confidence (>= 0.75)
                            resultText.innerText = data.message;
                            resultText.style.color = "#008CBA";
                            
                            // Prevent repeating the same label rapidly
                            if (lastDetectedLabel !== data.message || !window.speechSynthesis.speaking) {
                                speakOut(data.message);
                                lastDetectedLabel = data.message;
                            }
                        } else {
                            // Low confidence or invalid
                            resultText.innerText = data.message;
                            resultText.style.color = "#d9534f"; // Red to show attention needed
                            speakOut(data.message);
                            lastDetectedLabel = "";
                        }
                        
                    } else {
                        throw new Error("API responded with an error");
                    }
                } catch (e) {
                    console.error("Inference Error:", e);
                }
            }, "image/jpeg", 0.85); // Compress to save bandwidth
        }
    </script>
</body>
</html>
