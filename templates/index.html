<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks - Pendeteksi Uang Rupiah</title>
    <!-- WCAG 2.1 AA Compliance with 48pt font equivalent for visual output -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        #video-container {
            margin: 20px auto;
            max-width: 600px;
            border: 4px solid #4CAF50;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        #result-text {
            /* PRD requirement: Text must be large for visual impairment (approx. 48pt or large EM) */
            font-size: 48pt;
            font-weight: bold;
            color: #1a1a1a;
            margin-top: 20px;
        }
        .btn {
            font-size: 24pt;
            padding: 15px 30px;
            background-color: #008CBA;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            font-size: 18pt;
            color: #666;
            margin-top: 10px;
        }

        /* Screen reader focused area */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <h1 tabindex="0">Aplikasi MoneyTalks</h1>
    <p>Arahkan uang kertas Rupiah ke kamera Anda.</p>

    <!-- Controls -->
    <div>
        <button id="start-btn" class="btn" aria-label="Mulai Deteksi Kamera">Mulai Deteksi</button>
        <button id="stop-btn" class="btn" aria-label="Hentikan Deteksi" disabled>Berhenti</button>
    </div>

    <!-- Live Preview -->
    <div id="video-container">
        <!-- aria-live updates screen readers as detection changes -->
        <video id="camera-stream" autoplay playsinline aria-hidden="true"></video>
    </div>
    
    <!-- ARIA Live region for Screen Reader to read outputs automatically -->
    <div id="status" aria-live="polite">Kamera siap digunakan.</div>
    <div id="result-text" aria-live="assertive">Belum Dideteksi</div>

    <script>
        const video = document.getElementById("camera-stream");
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const resultText = document.getElementById("result-text");
        const statusText = document.getElementById("status");

        let stream = null;
        let detectionInterval = null;
        let isSpeaking = false;
        let lastDetectedLabel = "";
        let audioCooldown = null;

        startBtn.addEventListener("click", async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusText.innerText = "Kamera aktif. Sedang memproses gambar...";
                
                // PRD Requirement: Capture frame every 1 second (1000ms)
                detectionInterval = setInterval(captureAndSendFrame, 1000);
                speakOut("Kamera aktif. Mengambil gambar.");
                lastDetectedLabel = "";
            } catch (err) {
                console.error("Camera access error:", err);
                statusText.innerText = "Gagal mengakses kamera. " + err.message;
                speakOut("Gagal mengakses kamera.");
            }
        });

        stopBtn.addEventListener("click", () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            clearInterval(detectionInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "Kamera dinonaktifkan.";
            resultText.innerText = "Belum Dideteksi";
            speakOut("Kamera dimatikan.");
        });

        function speakOut(text) {
            // Web Speech API for zero-latency client-side audio
            if (!window.speechSynthesis) return;
            
            // Only speak if we aren't already speaking it to prevent overlapping spam
            if (window.speechSynthesis.speaking) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "id-ID";
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        async function captureAndSendFrame() {
            if (!video.videoWidth) return;

            // Draw to canvas
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas to Blob via fetch wrapper or native method -> form boundary
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("frame", blob, "frame.jpg");

                try {
                    const response = await fetch("/api/detect", {
                        method: "POST",
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        if (data.valid) {
                            // High confidence (>= 0.75)
                            resultText.innerText = data.message;
                            resultText.style.color = "#008CBA";
                            
                            // Prevent repeating the same label rapidly
                            if (lastDetectedLabel !== data.message || !window.speechSynthesis.speaking) {
                                speakOut(data.message);
                                lastDetectedLabel = data.message;
                            }
                        } else {
                            // Low confidence or invalid
                            resultText.innerText = data.message;
                            resultText.style.color = "#d9534f"; // Red to show attention needed
                            speakOut(data.message);
                            lastDetectedLabel = "";
                        }
                        
                    } else {
                        throw new Error("API responded with an error");
                    }
                } catch (e) {
                    console.error("Inference Error:", e);
                }
            }, "image/jpeg", 0.85); // Compress to save bandwidth
        }
    </script>
</body>
</html>
