<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — MoneyTalks</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
        a { color: #0ea5e9; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        nav { background: #0f172a; color: #f8fafc; padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: #38bdf8; }
        nav a { color: #cbd5e1; font-size: 0.9rem; padding: 4px 0; }
        nav a:hover, nav a.active { color: #f8fafc; text-decoration: none; border-bottom: 2px solid #38bdf8; }
        nav .spacer { flex: 1; }
        nav .user { font-size: 0.85rem; color: #94a3b8; }

        /* Layout */
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        h1 { font-size: 1.6rem; margin-bottom: 24px; color: #0f172a; }
        h2 { font-size: 1.2rem; margin-bottom: 16px; color: #1e293b; }

        /* Cards */
        .card { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 24px; }

        /* Alerts */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* Buttons */
        .btn { display: inline-block; padding: 8px 18px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s; }
        .btn-primary  { background: #0ea5e9; color: white; }
        .btn-primary:hover  { background: #0284c7; }
        .btn-success  { background: #22c55e; color: white; }
        .btn-success:hover  { background: #16a34a; }
        .btn-danger   { background: #ef4444; color: white; }
        .btn-danger:hover   { background: #dc2626; }
        .btn-outline  { background: white; color: #475569; border: 1px solid #cbd5e1; }
        .btn-outline:hover  { background: #f8fafc; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; text-align: left; padding: 10px 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input[type=text], input[type=email], input[type=password], input[type=date], input[type=file] {
            width: 100%; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            font-size: 0.9rem; outline: none; transition: border .15s;
        }
        input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,.15); }

        /* Badge */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.78rem; font-weight: 600; }
        .badge-green  { background: #dcfce7; color: #166534; }
        .badge-slate  { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<nav>
    <span class="brand">💵 MoneyTalks Admin</span>
    <a href="{{ url_for('admin_dashboard') }}" {% if request.endpoint == 'admin_dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('admin_images') }}"    {% if request.endpoint == 'admin_images' %}class="active"{% endif %}>Scan Images</a>
    <a href="{{ url_for('admin_models') }}"    {% if request.endpoint == 'admin_models' %}class="active"{% endif %}>Models</a>
    <span class="spacer"></span>
    <span class="user">{{ admin.email }}</span>
    <a href="{{ url_for('admin_logout') }}" style="color:#f87171">Logout</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
